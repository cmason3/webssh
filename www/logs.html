<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=768, user-scalable=no">
    <title>WebTTY Logs</title>
    <link rel="stylesheet" href="/{{.Version}}/css/bootstrap.css" />
    <link rel="stylesheet" href="/{{.Version}}/css/webtty.css" />
  </head>
  <body>
    <div id="mtoken" class="modal fade" data-bs-backdrop="static" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">WebTTY Logs</h4>
          </div>
          <div class="form-group row modal-body">
            <div class="col-sm-12">
              <label for="token" class="col-form-label">Authentication Token</label>
              <input type="password" id="token" class="form-control">
            </div>
          </div>
          <div class="modal-footer">
            <button id="btoken" type="button" class="btn btn-primary">OK</button>
          </div>
        </div>
      </div>
    </div>
    <div class="container-fluid p-2">
      <pre id="logs"></pre>
    </div>
    <script src="/{{.Version}}/js/bootstrap.js"></script>
    <script src="/{{.Version}}/js/logs.js"></script>
  </body>
</html>
