on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - run: |
          go mod tidy

      - run: |
          env GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o webtty -ldflags="-s -w" -trimpath main.go
          tar zcvf webtty-${{ github.ref_name }}-linux-amd64.tar.gz webtty

      - run: |
          env GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o webtty -ldflags="-s -w" -trimpath main.go
          tar zcvf webtty-${{ github.ref_name }}-macos-amd64.tar.gz webtty

      - run: |
          env GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o webtty -ldflags="-s -w" -trimpath main.go
          tar zcvf webtty-${{ github.ref_name }}-macos-arm64.tar.gz webtty

      - run: |
          env GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o webtty.exe -ldflags="-s -w" -trimpath main.go
          zip webtty-${{ github.ref_name }}-windows-x86_64.zip webtty.exe

      - uses: softprops/action-gh-release@v3
        with:
          name: WebTTY ${{ github.ref_name }}
          body: '[CHANGELOG](CHANGELOG.md)'
          files: |
            webtty-${{ github.ref_name }}-linux-amd64.tar.gz
            webtty-${{ github.ref_name }}-macos-amd64.tar.gz
            webtty-${{ github.ref_name }}-macos-arm64.tar.gz
            webtty-${{ github.ref_name }}-windows-x86_64.zip
